<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StudentGPT | Login Interface</title>
  <meta name="description" content="Access your 3D AI study dimension" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #010413;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --secondary: #6366f1;
      --panel: rgba(10, 15, 30, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-dim: #94a3b8;
    }

    body.light-mode {
      --bg: #f5f9ff;
      --accent: #059669;
      --secondary: #4f46e5;
      --panel: rgba(255, 255, 255, 0.8);
      --border: rgba(79, 70, 229, 0.1);
      --text: #0f172a;
      --text-dim: #475569;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      perspective: 2000px;
      padding: 24px;
      transition: background 0.4s ease;
    }

    /* 3D Grid Floor (Matching Landing) */
    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      transform: perspective(1000px) rotateX(60deg) translateY(-20%) translateZ(-400px);
      z-index: -1;
      opacity: 0.25;
      pointer-events: none;
    }

    body.light-mode .grid-bg {
      opacity: 0.4;
      background-image: 
        linear-gradient(rgba(79, 70, 229, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 70, 229, 0.08) 1px, transparent 1px);
    }

    /* Navigation / Back */
    .header-links {
      position: fixed;
      top: 30px;
      left: 0;
      width: 100%;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand-back {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      transition: all 0.3s;
    }

    .brand-back:hover { transform: scale(1.05); }

    .brand-back img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      filter: drop-shadow(0 0 8px var(--accent-glow));
    }

    #mode-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    body.light-mode #mode-btn {
       background: #0f172a;
       color: #fff;
    }

    /* Dimensional Auth Card */
    .auth-card {
      width: 100%;
      max-width: 480px;
      background: var(--panel);
      backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-radius: 48px;
      padding: 56px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
      box-shadow: 0 40px 100px rgba(0,0,0,0.4);
      z-index: 1;
    }

    .auth-card h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -1.5px;
      transform: translateZ(50px);
    }

    .auth-card .lead {
      color: var(--text-dim);
      font-size: 1.1rem;
      margin-bottom: 36px;
      line-height: 1.6;
      transform: translateZ(40px);
    }

    .form-group {
      margin-bottom: 24px;
      transform: translateZ(30px);
    }

    label {
      display: block;
      font-weight: 800;
      font-size: 0.85rem;
      color: var(--accent);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1.5px solid var(--border);
      padding: 18px 24px;
      border-radius: 18px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }

    body.light-mode input {
      background: rgba(255,255,255,0.8);
      border-color: rgba(79, 70, 229, 0.1);
      color: #0f172a;
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(0,0,0,0.4);
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.15);
    }

    .btn-3d {
      width: 100%;
      padding: 20px;
      border-radius: 50px;
      border: none;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--secondary));
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 8px 0 #064e3b, 0 15px 30px rgba(0,0,0,0.3);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin-top: 12px;
      transform: translateZ(60px);
    }

    .btn-3d:hover {
      transform: translateZ(70px) translateY(-4px);
      box-shadow: 0 12px 0 #064e3b, 0 20px 40px rgba(0,0,0,0.4);
    }

    .btn-3d:active {
      transform: translateZ(60px) translateY(4px);
      box-shadow: 0 0px 0 #064e3b;
    }

    .auth-links {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
      transform: translateZ(20px);
    }

    .auth-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .auth-links a:hover { color: var(--text); }

    .sep {
       margin: 32px 0;
       border: none;
       border-top: 1px solid var(--border);
       transform: translateZ(10px);
    }

    .footer-text {
       text-align: center;
       color: var(--text-dim);
       font-size: 0.85rem;
       line-height: 1.6;
       transform: translateZ(20px);
    }

    .footer-text a { color: var(--accent); text-decoration: none; font-weight: 700; }

    @media (max-width: 640px) {
       .auth-card { padding: 40px 24px; border-radius: 32px; }
       .header-links { padding: 0 20px; }
       .brand-back span { display: none; }
    }
  </style>
</head>

<body>
  <div class="grid-bg"></div>

  <div class="header-links">
    <a href="index.html" class="brand-back">
      <img src="Actual.png" alt="Logo">
      <span>STUDENTGPT</span>
    </a>
    <button id="mode-btn">MOON</button>
  </div>

  <main>
    <div class="auth-card" id="authCard">
      <h1>Sign in.</h1>
      <p class="lead">Step back into the dimension of fast learning and smart coding.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="login-email">Identifier (Email)</label>
          <input type="email" id="login-email" name="email" placeholder="YOU@EXAMPLE.COM" required>
        </div>

        <div class="form-group">
          <label for="login-password">Access Key (Password)</label>
          <input type="password" id="login-password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-3d">Initiate Session</button>

        <div class="auth-links">
          <a href="ResetPassword.html">Forgot Access?</a>
          <a href="signup.html">Create Identity</a>
        </div>

        <hr class="sep">

        <p class="footer-text">
          By initiating a session, you agree to our <br>
          <a href="terms.html">Terms</a> & <a href="privacy.html">Privacy</a>.
        </p>
      </form>
    </div>
  </main>

  <script>
    // Theme Sync
    const modeBtn = document.getElementById("mode-btn");
    modeBtn.addEventListener("click", () => {
      document.body.classList.toggle("light-mode");
      modeBtn.textContent = document.body.classList.contains("light-mode") ? "SUN" : "MOON";
      localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
    });

    // Handle initial theme
    if (localStorage.getItem("theme") === "light") {
      document.body.classList.add("light-mode");
      modeBtn.textContent = "SUN";
    }

    // 3D Tilt Card Effect
    const card = document.getElementById('authCard');
    document.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 30;
      const y = (e.clientY / window.innerHeight - 0.5) * 30;
      card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
    });
  </script>
  <script src="login.js" defer></script>
</body>

</html>

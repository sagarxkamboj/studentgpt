<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StudentGPT | Create Identity</title>
  <meta name="description" content="Create your 3D AI study account" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700;800&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #010413;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --secondary: #6366f1;
      --panel: rgba(10, 15, 30, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-dim: #94a3b8;
    }

    body.light-mode {
      --bg: #f5f9ff;
      --accent: #059669;
      --secondary: #4f46e5;
      --panel: rgba(255, 255, 255, 0.8);
      --border: rgba(79, 70, 229, 0.1);
      --text: #0f172a;
      --text-dim: #475569;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      perspective: 2000px;
      padding: 40px 24px;
      transition: background 0.4s ease;
    }

    /* 3D Grid Floor */
    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      transform: perspective(1000px) rotateX(60deg) translateY(-20%) translateZ(-400px);
      z-index: -1;
      opacity: 0.25;
      pointer-events: none;
    }

    body.light-mode .grid-bg {
      opacity: 0.4;
      background-image: 
        linear-gradient(rgba(79, 70, 229, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 70, 229, 0.08) 1px, transparent 1px);
    }

    /* Header Nav */
    .header-links {
      position: fixed;
      top: 30px;
      left: 0;
      width: 100%;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand-back {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      transition: all 0.3s;
    }

    .brand-back:hover { transform: scale(1.05); }

    .brand-back img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      filter: drop-shadow(0 0 8px var(--accent-glow));
    }

    #mode-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    body.light-mode #mode-btn { background: #0f172a; color: #fff; }

    /* Dimensional Signup Card */
    .auth-card {
      width: 100%;
      max-width: 600px;
      background: var(--panel);
      backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-radius: 48px;
      padding: 56px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
      box-shadow: 0 40px 100px rgba(0,0,0,0.4);
      z-index: 1;
    }

    .auth-card h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -2.5px;
      transform: translateZ(50px);
    }

    .lead {
      color: var(--text-dim);
      font-size: 1.1rem;
      margin-bottom: 32px;
      line-height: 1.6;
      transform: translateZ(40px);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      transform: translateZ(30px);
    }

    .form-group { margin-bottom: 20px; transform: translateZ(30px); }

    label {
      display: block;
      font-weight: 800;
      font-size: 0.8rem;
      color: var(--accent);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1.5px solid var(--border);
      padding: 16px 20px;
      border-radius: 16px;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s;
    }

    body.light-mode input {
      background: rgba(255,255,255,0.8);
      border-color: rgba(79, 70, 229, 0.1);
      color: #0f172a;
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(0,0,0,0.4);
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.15);
    }

    .btn-3d {
      width: 100%;
      padding: 18px;
      border-radius: 50px;
      border: none;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--secondary));
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 8px 0 #064e3b, 0 15px 30px rgba(0,0,0,0.3);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin-top: 10px;
      transform: translateZ(60px);
    }

    .btn-3d:hover {
      transform: translateZ(70px) translateY(-4px);
      box-shadow: 0 12px 0 #064e3b, 0 20px 40px rgba(0,0,0,0.4);
    }

    .btn-3d:active {
      transform: translateZ(60px) translateY(4px);
      box-shadow: 0 0px 0 #064e3b;
    }

    /* OTP Specific Styles */
    .otp-panel {
      display: none;
      margin-top: 24px;
      padding: 30px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transform: translateZ(45px);
    }

    .otp-info { color: var(--accent); font-weight: 600; font-size: 0.9rem; margin-bottom: 12px; }
    .otp-row { display: flex; gap: 12px; margin-top: 15px; }
    .otp-row input { flex: 1; text-align: center; font-size: 1.25rem; font-weight: 800; letter-spacing: 8px; }
    
    .btn-verify {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 0 24px;
      border-radius: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .otp-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding: 0 10px; }
    .resend-link { background: none; border: none; color: var(--text-dim); cursor: pointer; font-weight: 700; font-size: 0.85rem; }
    .resend-link:hover { color: var(--accent); }
    .resend-timer { font-size: 0.85rem; color: var(--text-dim); }

    .error { color: #f87171; font-size: 0.85rem; font-weight: 600; margin-top: 12px; transform: translateZ(20px); }

    .sep { margin: 32px 0; border: none; border-top: 1px solid var(--border); transform: translateZ(10px); }
    .footer-text { text-align: center; color: var(--text-dim); font-size: 0.9rem; transform: translateZ(20px); }
    .footer-text a { color: var(--accent); text-decoration: none; font-weight: 700; }

    @media (max-width: 640px) {
       .auth-card { padding: 40px 24px; border-radius: 32px; }
       .form-grid { grid-template-columns: 1fr; gap: 0; }
       .header-links { padding: 0 20px; }
       .brand-back span { display: none; }
       .otp-row { flex-direction: column; }
       .btn-verify { padding: 16px; }
    }
  </style>
</head>

<body>
  <div class="grid-bg"></div>

  <div class="header-links">
    <a href="index.html" class="brand-back">
      <img src="Actual.png" alt="Logo">
      <span>STUDENTGPT</span>
    </a>
    <button id="mode-btn">MOON</button>
  </div>

  <main>
    <div class="auth-card" id="authCard">
      <h1>Join the dimension.</h1>
      <p class="lead">Unlock your high-fidelity AI study workspace.</p>

      <form id="signupForm" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" name="name" placeholder="JOHN DOE" required>
          </div>
          <div class="form-group">
             <label for="signup-phone">Phone (Optional)</label>
             <input type="tel" id="signup-phone" name="phone" placeholder="9876543210" pattern="[0-9]{10}">
          </div>
        </div>

        <div class="form-group">
          <label for="signup-email">Signal Address (Email)</label>
          <input type="email" id="signup-email" name="email" placeholder="YOU@EXAMPLE.COM" required>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="signup-password">Access Key</label>
            <input type="password" id="signup-password" name="password" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label for="signup-confirm">Re-Key</label>
            <input type="password" id="signup-confirm" name="confirm" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" id="signup-btn" class="btn-3d">Generate Identity</button>
        <div id="form-error" class="error" style="display: none; text-align: center;"></div>

        <div id="otpPanel" class="otp-panel">
          <div class="otp-info" id="otpInfo">A 6-digit code was sent to your email.</div>
          <div class="otp-row">
            <input id="otpInput" type="text" inputmode="numeric" maxlength="6" placeholder="000000">
            <button id="verifyOtpBtn" class="btn-verify" type="button">Verify</button>
          </div>
          <div class="otp-actions">
            <button id="resendOtpBtn" class="resend-link" type="button">Resend Code</button>
            <div id="resendTimer" class="resend-timer"></div>
            <div id="otp-error" class="error" style="display: none; margin: 0;"></div>
          </div>
        </div>

        <hr class="sep">

        <p class="footer-text">
          Already have an identity? <a href="Login.html">Sign in.</a><br><br>
          <span style="font-size: 0.8rem; opacity: 0.6">By joining, you agree to our 
          <a href="terms.html">Terms</a> & <a href="privacy.html">Privacy</a>.</span>
        </p>
      </form>
    </div>
  </main>

  <script>
    // Theme Sync
    const modeBtn = document.getElementById("mode-btn");
    modeBtn.addEventListener("click", () => {
      const isLight = document.body.classList.toggle("light-mode");
      modeBtn.textContent = isLight ? "SUN" : "MOON";
      localStorage.setItem("theme", isLight ? "light" : "dark");
    });

    if (localStorage.getItem("theme") === "light") {
      document.body.classList.add("light-mode");
      modeBtn.textContent = "SUN";
    }

    // 3D Tilt Effect
    const card = document.getElementById('authCard');
    document.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;
      card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
    });

    // --- PRESERVED FUNCTIONALITY (Original Script Logic) ---
    (function () {
      const API_BASE = "https://studentgpt-4zbc.onrender.com";
      const form = document.getElementById("signupForm");
      const nameEl = document.getElementById("signup-name");
      const phoneEl = document.getElementById("signup-phone");
      const emailEl = document.getElementById("signup-email");
      const passEl = document.getElementById("signup-password");
      const confirmEl = document.getElementById("signup-confirm");
      const formError = document.getElementById("form-error");
      const otpPanel = document.getElementById("otpPanel");
      const otpInput = document.getElementById("otpInput");
      const verifyOtpBtn = document.getElementById("verifyOtpBtn");
      const resendOtpBtn = document.getElementById("resendOtpBtn");
      const resendTimer = document.getElementById("resendTimer");
      const otpError = document.getElementById("otp-error");

      function showFormError(msg) { formError.style.display = "block"; formError.textContent = msg; }
      function clearFormError() { formError.style.display = "none"; }
      function showOtpError(msg) { otpError.style.display = "block"; otpError.textContent = msg; }
      function clearOtpError() { otpError.style.display = "none"; }

      let resendCountdown = 0, resendInterval = null;
      function startResendTimer(seconds = 60) {
        clearInterval(resendInterval);
        resendCountdown = seconds;
        resendTimer.textContent = `Resend in ${resendCountdown}s`;
        resendOtpBtn.disabled = true;
        resendInterval = setInterval(() => {
          resendCountdown--;
          if (resendCountdown <= 0) { clearInterval(resendInterval); resendTimer.textContent = ""; resendOtpBtn.disabled = false; }
          else resendTimer.textContent = `Resend in ${resendCountdown}s`;
        }, 1000);
      }

      async function sendOtp(email) {
        const res = await fetch(API_BASE + "/send-otp", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email }) });
        if (!res.ok) { const t = await res.text().catch(() => ""); throw new Error(t || `HTTP ${res.status}`); }
        return res.json().catch(() => ({}));
      }

      async function verifyOtpRequest(email, otp) {
        const res = await fetch(API_BASE + "/verify-otp", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, otp }) });
        if (!res.ok) { const t = await res.text().catch(() => ""); throw new Error(t || `HTTP ${res.status}`); }
        return res.json().catch(() => ({}));
      }

      async function signupFinal(payload) {
        const res = await fetch(API_BASE + "/signup", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        if (!res.ok) { const t = await res.text().catch(() => ""); throw new Error(t || `HTTP ${res.status}`); }
        return res.json().catch(() => ({}));
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearFormError();
        const name = nameEl.value.trim();
        const email = emailEl.value.trim();
        const password = passEl.value;
        const confirm = confirmEl.value;
        if (!name || !email || !password || !confirm) { showFormError("Required fields missing."); return; }
        if (password !== confirm) { showFormError("Passwords mismatch."); return; }
        if (password.length < 8) { showFormError("Min 8 chars required."); return; }

        try {
          const btn = document.getElementById("signup-btn");
          btn.disabled = true;
          await sendOtp(email);
          otpPanel.style.display = "block";
          document.getElementById("otpInfo").textContent = `Code sent to ${email}`;
          startResendTimer(60);
          btn.disabled = false;
          otpInput.focus();
        } catch (err) {
          showFormError("OTP failed: " + err.message);
          document.getElementById("signup-btn").disabled = false;
        }
      });

      verifyOtpBtn.addEventListener("click", async () => {
        clearOtpError();
        const email = emailEl.value.trim();
        const otp = (otpInput.value || "").trim();
        if (!otp) { showOtpError("Enter OTP."); return; }
        verifyOtpBtn.disabled = true;
        try {
          await verifyOtpRequest(email, otp);
          const payload = { name: nameEl.value.trim(), email, password: passEl.value };
          const p = phoneEl.value.trim().replace(/\D/g, "");
          if (p) payload.phone = p;
          const res = await signupFinal(payload);
          const token = res.token || res.accessToken || "";
          if (token) {
            localStorage.setItem("token", token);
            localStorage.setItem("userName", res.name || payload.name.split(" ")[0]);
            window.location.href = "chat.html";
          } else { window.location.href = "Login.html"; }
        } catch (err) { showOtpError("Failed: " + err.message); }
        finally { verifyOtpBtn.disabled = false; }
      });

      resendOtpBtn.addEventListener("click", async () => {
        clearOtpError();
        const email = emailEl.value.trim();
        if (!email) return;
        resendOtpBtn.disabled = true;
        try { await sendOtp(email); startResendTimer(60); }
        catch (err) { showOtpError("Resend failed."); resendOtpBtn.disabled = false; }
      });
    })();
  </script>
</body>

</html>

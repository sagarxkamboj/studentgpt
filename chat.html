<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudentGPT | Dimensional Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700;800&display=swap"
    rel="stylesheet" />

  <!-- Markdown & Highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root {
      --bg: #010413;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --secondary: #6366f1;
      --panel: rgba(10, 15, 30, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-dim: #94a3b8;
      --bubble-bot: rgba(255, 255, 255, 0.05);
      --bubble-user: linear-gradient(135deg, var(--accent), var(--secondary));
    }

    body.light-mode {
      --bg: #f5f9ff;
      --accent: #059669;
      --secondary: #4f46e5;
      --panel: rgba(255, 255, 255, 0.85);
      --border: rgba(79, 70, 229, 0.1);
      --text: #0f172a;
      --text-dim: #475569;
      --bubble-bot: rgba(79, 70, 229, 0.05);
      --bubble-user: linear-gradient(135deg, #4f46e5, #3b82f6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      padding: 20px;
      transition: background 0.4s ease;
    }

    /* 3D Grid Backdrop */
    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      transform: perspective(1000px) rotateX(65deg) translateY(-10%) translateZ(-500px);
      z-index: -1;
      opacity: 0.15;
      pointer-events: none;
    }

    .app-wrapper {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* --- SIDEBAR (3D Dock) --- */
    .sidebar {
      background: var(--panel);
      backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-radius: 40px;
      display: flex;
      flex-direction: column;
      padding: 32px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .sidebar::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, var(--accent), var(--secondary));
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .sidebar-header img {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .btn-new-chat {
      width: 100%;
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin-bottom: 30px;
    }

    .btn-new-chat:hover {
      background: var(--text);
      color: var(--bg);
      transform: translateY(-4px);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }

    /* Sessions List */
    .sessions-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
      padding-right: 5px;
    }

    .sessions-list::-webkit-scrollbar {
      width: 4px;
    }

    .sessions-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    .session-item {
      padding: 14px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s;
    }

    .session-item:hover,
    .session-item.active {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border);
      color: var(--text);
    }

    .session-item.active {
      border-color: var(--accent);
      background: rgba(16, 185, 129, 0.05);
    }

    /* Sidebar Footer */
    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .user-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--secondary));
      display: grid;
      place-items: center;
      font-weight: 800;
      color: white;
    }

    .user-meta strong {
      display: block;
      font-size: 0.85rem;
    }

    .user-meta small {
      color: var(--text-dim);
      font-size: 0.75rem;
    }

    .btn-danger {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(248, 113, 113, 0.2);
      color: #f87171;
      padding: 12px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-danger:hover {
      background: rgba(248, 113, 113, 0.1);
      border-color: #f87171;
    }

    /* --- CHAT AREA --- */
    .chat-area {
      background: var(--panel);
      backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-radius: 40px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.3);
    }

    /* Header */
    .chat-header {
      padding: 24px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-content h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
    }

    .header-content p {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .model-selector {
      display: flex;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      padding: 4px;
      border-radius: 20px;
      gap: 4px;
    }

    .model-btn {
      padding: 8px 16px;
      border-radius: 16px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      font-size: 0.75rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .model-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }

    .model-btn.active {
      background: var(--text);
      color: var(--bg);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    body.light-mode .model-btn.active {
      background: var(--bg);
      color: var(--text);
    }


    .btn-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.3s;
    }

    .btn-icon:hover {
      background: var(--text);
      color: var(--bg);
    }

    /* Messages Container */
    .messages-viewport {
      overflow-y: auto;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      scroll-behavior: smooth;
    }

    .messages-viewport::-webkit-scrollbar {
      width: 6px;
    }

    .messages-viewport::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    /* Welcome Hero */
    .welcome-hero {
      max-width: 600px;
      margin: 100px auto;
      text-align: center;
    }

    .welcome-hero img {
      width: 80px;
      margin-bottom: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 50px var(--accent-glow);
    }

    .welcome-hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 20px;
    }

    .welcome-hero p {
      color: var(--text-dim);
      font-size: 1.2rem;
      line-height: 1.6;
    }

    /* Message Bubbles */
    .msg-group {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: msgPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .msg-group.user {
      align-self: flex-end;
    }

    .msg-group.bot {
      align-self: flex-start;
    }

    .msg-bubble {
      padding: 18px 24px;
      border-radius: 24px;
      line-height: 1.7;
      font-size: 1.05rem;
      position: relative;
    }

    .msg-group.user .msg-bubble {
      background: var(--bubble-user);
      color: white;
      border-radius: 30px 30px 4px 30px;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
    }

    .msg-group.bot .msg-bubble {
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-radius: 30px 30px 30px 4px;
    }

    .msg-meta {
      margin-top: 8px;
      font-size: 0.75rem;
      color: var(--text-dim);
      display: flex;
      gap: 12px;
      padding: 0 12px;
    }

    .msg-group.user .msg-meta {
      justify-content: flex-end;
    }

    .provider-badge {
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--accent);
    }

    /* Input Area */
    .input-dock {
      padding: 30px 40px 40px;
      background: linear-gradient(to top, var(--panel), transparent);
    }

    .input-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.2);
      border: 1.5px solid var(--border);
      border-radius: 30px;
      display: flex;
      align-items: center;
      padding: 10px 10px 10px 24px;
      transition: all 0.3s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.1);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1rem;
      padding: 10px 0;
      resize: none;
      max-height: 200px;
      font-family: inherit;
    }

    .btn-send {
      width: 54px;
      height: 54px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--secondary));
      border: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      color: white;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .btn-send:hover {
      transform: scale(1.05) rotate(5deg);
    }

    /* Markdown Overrides */
    .msg-bubble pre {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 14px;
      padding: 18px;
      margin: 15px 0;
      overflow-x: auto;
      border: 1px solid var(--border);
    }

    .msg-bubble code {
      font-family: 'Fira Code', monospace;
      font-size: 0.9em;
    }

    @keyframes msgPop {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 1080px) {
      .sidebar {
        display: none;
      }

      .app-wrapper {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="grid-bg"></div>

  <div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="Actual.png" alt="Logo">
        <span>STUDENTGPT</span>
      </div>

      <button class="btn-new-chat" id="newChatBtn">
        <span>✚</span> NEW DIMENSION
      </button>

      <div class="sessions-list" id="sessionsList">
        <!-- Sessions load here -->
      </div>

      <div class="sidebar-footer">
        <div class="user-pill">
          <div class="user-icon" id="userInitial">S</div>
          <div class="user-meta">
            <strong id="userName">Student</strong>
            <small id="userEmail">Loading identity...</small>
          </div>
        </div>
        <div style="display: flex; gap: 10px;">
          <button class="btn-danger" id="clearHistoryBtn" style="flex: 1;">CLEAR</button>
          <button class="btn-danger" id="logoutBtn" style="flex: 1;">LOGOUT</button>
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-area">
      <header class="chat-header">
        <div class="header-content">
          <h2 id="currentChatTitle">AI Workspace</h2>
          <p>Dimensional Study Interface v4.0</p>
        </div>

        <div class="header-actions">
          <div class="model-selector" id="modelSelector">
            <button class="model-btn active" data-value="gemini">Gemini PRO</button>
            <button class="model-btn" data-value="qwen">Qwen 3 Coder</button>
            <button class="model-btn" data-value="deepseek">DeepSeek</button>
          </div>
          <button class="btn-icon" id="exportPdfBtn" title="Export as PDF">📥</button>
          <button class="btn-icon" id="theme-btn" title="Toggle Theme">🌓</button>
        </div>
      </header>

      <!-- Viewport -->
      <div class="messages-viewport" id="messages">
        <div id="messagesWrapper" style="display: flex; flex-direction: column; gap: 30px;">
          <!-- Messages load here -->
        </div>

        <div class="welcome-hero" id="welcome-container">
          <img src="Actual.png" alt="StudentGPT">
          <h1>Master the<br>Impossible.</h1>
          <p>Launch a session to unlock deep explanations, coding aid, and assignment mastery.</p>
        </div>
      </div>

      <!-- Input Dock -->
      <footer class="input-dock">
        <form class="input-wrapper" id="chatForm">
          <textarea id="userInput" placeholder="Signal your thoughts..." rows="1"></textarea>
          <button type="submit" class="btn-send" id="sendBtn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>
        <div
          style="text-align: center; margin-top: 14px; font-size: 0.75rem; color: var(--text-dim); font-weight: 700;">
          ENGINEERED BY <span style="color: var(--accent)">SAGAR KAMBOJ</span> • STUDENTGPT DIMENSION
        </div>
      </footer>
    </main>
  </div>

  <script src="chatbot.js"></script>
  <script>
    // Theme Sync for Chat
    const themeBtn = document.getElementById('theme-btn');
    themeBtn.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

    // Auto-resize textarea
    const tx = document.getElementById('userInput');
    tx.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });
  </script>
</body>

</html>
